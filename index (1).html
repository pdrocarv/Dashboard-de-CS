<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de CS - Stays</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Roboto",sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;transition:background .2s,color .2s}
:root{--bg:#e6e3e3;--surf:#fff;--surf2:#f4f2f2;--surf3:#ece9e9;--bd:#d0cccc;--t:#1c383d;--t2:#3d5a5f;--t3:#7a9298;--sh:0 1px 3px rgba(28,56,61,.1);--b600:#1d9fbf;--b700:#1787a3;--b50:#e8f7fb;--gn50:#e8f5ec;--gn600:#1f943c;--gn700:#187530;--gn800:#145f27;--am50:#fef7e8;--am600:#f3b02a;--am700:#d4941a;--rd50:#fdeef3;--rd600:#ce1e5a;--rd700:#b01a4d;--rd800:#8d1540;--ic-c:#e8f5ec;--ic-d:#e8f7fb;--ic-ds:#f0ebfb;--ic-co:#fef7e8;--ic-f:#e5f5f7;--ic-t:#e8f7fb;--ic-r:#fdeef3;--ic-e:#fff3e8;--warn-c:#fef7e8;--warn-b:#f3b02a;--risk-c:#fdeef3;--risk-b:#ce1e5a;--ok-b:#1f943c;--badge-ok-bg:#e8f5ec;--badge-ok-t:#145f27;--badge-warn-bg:#fef7e8;--badge-warn-t:#a06b0a;--badge-risk-bg:#fdeef3;--badge-risk-t:#8d1540;--badge-na-bg:#ece9e9;--badge-na-t:#7a9298;--stays-teal:#1d9fbf;--stays-petrol:#1c383d;--stays-rose:#ce1e5a;--stays-yellow:#f3b02a;--stays-green:#1f943c}
.th-dark{--bg:#0d1f22;--surf:#142830;--surf2:#1a333c;--surf3:#1f3d47;--bd:#2a4a52;--t:#e8f5f7;--t2:#8ab8c0;--t3:#527a82;--sh:0 1px 4px rgba(0,0,0,.4);--b600:#1d9fbf;--b700:#1787a3;--b50:#0d2f38;--gn50:#0a2914;--gn600:#1f943c;--gn700:#187530;--gn800:#a8e6b8;--am50:#2e1f00;--am600:#f3b02a;--am700:#d4941a;--rd50:#2e0a18;--rd600:#f06090;--rd700:#ce1e5a;--rd800:#f8b4ce;--ic-c:#0a2914;--ic-d:#0d2f38;--ic-ds:#1a0d2e;--ic-co:#2e1f00;--ic-f:#0a2420;--ic-t:#0d2f38;--ic-r:#2e0a18;--ic-e:#2e1800;--warn-c:#2e1f00;--warn-b:#f3b02a;--risk-c:#2e0a18;--risk-b:#f06090;--ok-b:#1f943c;--badge-ok-bg:#0a2914;--badge-ok-t:#a8e6b8;--badge-warn-bg:#2e1f00;--badge-warn-t:#fcd88a;--badge-risk-bg:#2e0a18;--badge-risk-t:#f8b4ce;--badge-na-bg:#1a333c;--badge-na-t:#527a82}
.th-night{--bg:#0f1a2e;--surf:#172035;--surf2:#1e2a42;--surf3:#253250;--bd:#2e4068;--t:#e2eaf5;--t2:#7a9cc0;--t3:#4a6888;--sh:0 1px 4px rgba(0,0,0,.3);--b600:#1d9fbf;--b700:#1787a3;--b50:#0d2030;--gn50:#0a2014;--gn600:#1f943c;--gn700:#187530;--gn800:#a8e6b8;--am50:#251800;--am600:#f3b02a;--am700:#d4941a;--rd50:#200a18;--rd600:#f06090;--rd700:#ce1e5a;--rd800:#f8b4ce;--ic-c:#0a2014;--ic-d:#0d2030;--ic-ds:#1a0d2e;--ic-co:#251800;--ic-f:#0a1e1c;--ic-t:#0d2030;--ic-r:#200a18;--ic-e:#1e1000;--warn-c:#251800;--warn-b:#f3b02a;--risk-c:#200a18;--risk-b:#f06090;--ok-b:#1f943c;--badge-ok-bg:#0a2014;--badge-ok-t:#a8e6b8;--badge-warn-bg:#251800;--badge-warn-t:#fcd88a;--badge-risk-bg:#200a18;--badge-risk-t:#f8b4ce;--badge-na-bg:#1e2a42;--badge-na-t:#4a6888}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surf);border:1px solid var(--bd);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-family:"Roboto Slab",serif;font-size:28px;color:#1c383d;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:2rem}
.btn-google{background:#fff;border:1px solid #ddd;border-radius:8px;padding:11px 20px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;color:#333;font-weight:500;width:100%;justify-content:center;transition:box-shadow .2s;margin-bottom:10px}
.btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.15)}
.login-divider{font-size:12px;color:var(--t3);margin:1rem 0;position:relative}
.login-divider::before,.login-divider::after{content:"";position:absolute;top:50%;width:42%;height:1px;background:var(--bd)}
.login-divider::before{left:0}.login-divider::after{right:0}
.pending-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.pending-card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:2rem;max-width:420px;text-align:center}
.nav{background:var(--surf);border-bottom:1px solid var(--bd);padding:0 1.25rem;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.brand{font-size:14px;color:#1c383d;font-family:"Roboto Slab",serif}.divider{width:1px;height:20px;background:var(--bd);flex-shrink:0}.nav-title{font-size:13px;color:var(--t2)}.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.theme-select{font-size:12px;padding:4px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--surf2);color:var(--t);cursor:pointer;font-family:"Roboto",sans-serif}
.page{max-width:1400px;margin:0 auto;padding:1.25rem}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem}
.metric{background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;box-shadow:var(--sh);transition:box-shadow .25s ease}
.metric-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.kpi-group{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.kpi-group-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:10px}
.badge-churn{display:inline-flex;align-items:center;gap:3px;background:#fde8e8;color:#b91c1c;border:1px solid #f87171;border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;white-space:nowrap}
.badge-inadim{display:inline-flex;align-items:center;gap:3px;background:#fff3e0;color:#c2410c;border:1px solid #fb923c;border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;white-space:nowrap}
.badge-suggest{display:inline-flex;align-items:center;gap:3px;background:#e8f7fb;color:#0f5a6e;border:1px solid #1d9fbf;border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;white-space:nowrap}
.badge-recovery{display:inline-flex;align-items:center;gap:3px;background:#fefce8;color:#854d0e;border:1px solid #fbbf24;border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;white-space:nowrap}
.inad-month-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--surf);margin-bottom:6px}
.inad-month-row.paid{opacity:.5;text-decoration:line-through}
.alert-section{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.alert-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:10px}
.btn-churn{background:#fde8e8;color:#b91c1c;border:1px solid #f87171;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s ease}
.btn-churn-hist{background:var(--surf2);color:var(--t2);border:1px solid var(--bd);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s ease}
.btn-churn-hist:hover{border-color:#b91c1c;color:#b91c1c}
.btn-churn:hover{background:#fca5a5;color:#7f1d1d}
.btn-inadim{background:#fff3e0;color:#c2410c;border:1px solid #fb923c;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s ease}
.btn-inadim:hover{background:#fed7aa;color:#7c2d12}
.badge-recovery{display:inline-flex;align-items:center;gap:3px;background:#fefce8;color:#854d0e;border:1px solid #fbbf24;border-radius:5px;font-size:9px;font-weight:700;padding:1px 6px;white-space:nowrap}
.archived-card{background:var(--surf);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;opacity:.8}
.archived-card:hover{opacity:1}
.wiz-wrap{max-width:640px;margin:0 auto;padding:.5rem 0}
.wiz-progress{height:3px;background:var(--bd);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.wiz-progress-fill{height:100%;background:var(--b600);border-radius:2px;transition:width .4s ease}
.wiz-step-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.25rem;display:flex;align-items:center;gap:6px}
.wiz-card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.wiz-hint{font-size:11px;color:var(--t3);margin-bottom:.5rem;display:flex;align-items:center;gap:5px}
.wiz-q{font-size:17px;font-weight:500;color:var(--t);margin-bottom:.4rem;line-height:1.4}
.wiz-q-sub{font-size:13px;color:var(--t2);margin-bottom:1.25rem;line-height:1.6}
.wiz-opts{display:flex;flex-direction:column;gap:8px}
.wiz-opt{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .18s;background:var(--surf2)}
.wiz-opt:hover{border-color:var(--b600);background:var(--b50)}
.wiz-opt.sel{border-color:var(--b600);background:var(--b50)}
.wiz-opt-ico{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.wiz-opt-lbl{font-size:14px;color:var(--t)}
.wiz-humor{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--bd)}
.wiz-humor-lbl{font-size:11px;color:var(--t2);font-weight:500;margin-bottom:.6rem}
.wiz-faces{display:flex;gap:6px;flex-wrap:wrap}
.wiz-face-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--bd);cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);transition:all .15s;white-space:nowrap}
.wiz-face-btn:hover{border-color:var(--b600)}
.wiz-face-btn.wf-auto{outline:2px dashed var(--bd);outline-offset:2px}
.wiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:1rem}
.wiz-counter{font-size:12px;color:var(--t3)}
.wiz-input{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:14px;font-family:"Roboto",sans-serif;color:var(--t);background:var(--surf);transition:border .1s}
.wiz-input:focus{outline:none;border-color:var(--b600)}
.wiz-input-sm{width:140px}
.wiz-note{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:"Roboto",sans-serif;color:var(--t);background:var(--surf2);resize:none;margin-top:.75rem}
.wiz-note:focus{outline:none;border-color:var(--b600)}
.wiz-sub-section{margin-top:1rem;padding-top:1rem;border-top:1px dashed var(--bd)}
.wiz-sub-q{font-size:14px;font-weight:500;color:var(--t);margin-bottom:.75rem}
.wiz-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.wiz-alert{background:var(--am50);border:1px solid var(--am600);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--am600);line-height:1.6;margin-top:.75rem}
.wiz-ch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.75rem}
.wiz-ch{text-align:center;padding:10px 6px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .18s;background:var(--surf2);opacity:.45}
.wiz-ch.active{opacity:1;border-color:var(--b600);background:var(--b50)}
.wiz-ch-logo{width:36px;height:36px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.wiz-ch-name{font-size:10px;color:var(--t3);margin-bottom:4px}
.wiz-ch-qty{margin-top:4px}
.wiz-city-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--b50);border:1px solid var(--b600);border-radius:20px;margin:3px;font-size:12px;color:var(--b600)}
.wiz-summary-card{background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.wiz-info-banner{background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:var(--t2);line-height:1.6}
/* ── Slide Panel ── */
.slide-panel{position:fixed;right:-400px;top:52px;bottom:0;width:380px;background:var(--surf);border-left:1px solid var(--bd);z-index:90;transition:right .38s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.slide-panel.open{right:0}
.sp-header{padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sp-client-name{font-size:14px;font-weight:600;color:var(--t)}
.sp-client-sub{font-size:11px;color:var(--t3);margin-top:2px}
.sp-tabs{display:flex;padding:8px 16px;gap:6px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sp-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--t3);font-family:inherit;transition:all .18s ease}
.sp-tab.active{background:var(--b50);color:var(--b600)}
.sp-body{flex:1;overflow-y:auto;padding:12px 16px}
.sp-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--t3);padding:2px 6px;border-radius:4px}
.sp-close:hover{background:var(--surf2);color:var(--t)}
/* ── Activity items ── */
.act-item{padding:10px 12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;background:var(--surf);transition:box-shadow .18s ease}
.act-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.act-type-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--t3)}
/* ── Reminder items ── */
.rem-item{padding:10px 12px;border-radius:8px;margin-bottom:8px;border-left:3px solid}
.rem-retorno{background:#fde8e8;border-color:#f87171}
.rem-proativo{background:#e8f0fe;border-color:#60a5fa}
.rem-done{opacity:.5;text-decoration:line-through;filter:grayscale(1)}
/* ── Table dots ── */
.rem-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;cursor:pointer}
.rem-dot-retorno{background:#ef4444}
.rem-dot-proativo{background:#3b82f6}
/* ── Thermometer ── */
.thermo{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;white-space:nowrap}
.thermo-green{color:#16a34a}
.thermo-yellow{color:#d97706}
.thermo-red{color:#dc2626}
/* ── Add form in panel ── */
.sp-add-form{border-top:1px solid var(--bd);padding:12px 16px;flex-shrink:0;background:var(--surf2)}
.metric-val{font-size:22px;line-height:1;font-family:"Roboto Slab",serif}
.mv-d{color:var(--t)}.mv-r{color:var(--rd600)}.mv-a{color:var(--am600)}.mv-g{color:var(--gn600)}.mv-b{color:var(--b600)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap}
.b-ok{background:var(--badge-ok-bg);color:var(--badge-ok-t)}.b-warn{background:var(--badge-warn-bg);color:var(--badge-warn-t)}.b-risk{background:var(--badge-risk-bg);color:var(--badge-risk-t)}.b-na{background:var(--badge-na-bg);color:var(--badge-na-t)}.b-blue{background:var(--b50);color:var(--b600)}
.card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh);transition:box-shadow .3s cubic-bezier(0.16,1,0.3,1)}.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1050px}thead tr{background:var(--surf2)}
th{font-size:11px;font-weight:700;color:var(--t3);padding:11px 16px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;position:relative}
td{padding:12px 16px;border-bottom:1px solid var(--bd);vertical-align:middle}tr:last-child td{border-bottom:none}tr:hover td{background:var(--surf2)}
th[data-tip]{cursor:help}
th[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 4px);left:0;z-index:999;background:rgba(15,17,23,.92);color:#f1f5f9;padding:7px 11px;border-radius:7px;font-size:11px;white-space:pre-wrap;max-width:230px;line-height:1.5;font-weight:400;text-transform:none;letter-spacing:0;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.btn{background:var(--surf);border:1px solid var(--bd);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:5px;font-family:"Roboto",sans-serif;font-weight:500;transition:background .1s}.btn:hover{background:var(--surf2)}.btn-sm{padding:4px 10px;font-size:12px}
.btn-primary{background:var(--b600);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Roboto",sans-serif;display:inline-flex;align-items:center;gap:6px;transition:background .1s}.btn-primary:hover{background:var(--b700)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:#1f943c;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Roboto",sans-serif;display:inline-flex;align-items:center;gap:6px}.btn-green:hover{background:#187530}
.btn-save{background:#1f943c;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Roboto",sans-serif;display:inline-flex;align-items:center;gap:6px}.btn-save:hover{background:#187530}
.btn-edit{background:#f3b02a;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:"Roboto",sans-serif;display:inline-flex;align-items:center;gap:5px}.btn-edit:hover{background:#d4941a}
.saved-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;background:#e8f5ec;color:#145f27;border:1px solid #1f943c}
.sms-btn{width:34px;height:34px;border-radius:50%;background:#1c383d;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;padding:0}.sms-btn:hover{opacity:.85}
.th-dark .sms-btn,.th-night .sms-btn{box-shadow:0 0 0 2px #fff}
.city-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:12px;font-weight:500;background:#e8f7fb;color:#0f5a6e;border:1px solid #1d9fbf;margin:2px}
.city-chip button{background:none;border:none;cursor:pointer;color:#0f5a6e;font-size:12px;line-height:1;padding:0 0 0 2px;display:flex;align-items:center}.city-chip button:hover{color:#ce1e5a}
.ch-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;transition:border-color .15s}

setTheme(S.theme);
function emailPermitido(email){return email&&(email.endsWith('@stays.net')||email==='pdroc.ferreira@gmail.com');}
var _authTimer=setTimeout(function(){if(!S.appReady){console.warn("Auth timeout — reloading");window.location.reload();}},9000);
auth.onAuthStateChanged(async function(fbUser){clearTimeout(_authTimer);
  if(fbUser&&!emailPermitido(fbUser.email)){
    await auth.signOut();
    S.appUser={unauthorized:true,email:fbUser.email};
    S.appReady=true;render();return;
  }
  if(fbUser){
    try{
      var doc=await db.collection("users").doc(fbUser.uid).get();
      if(doc.exists){
        S.appUser=Object.assign({uid:fbUser.uid},doc.data());
        if(S.appUser.role==="pending"){S.appReady=true;render();return;}
      } else {
        var all=await db.collection("users").limit(1).get();
        var profile={name:fbUser.displayName||fbUser.email,email:fbUser.email,photo:fbUser.photoURL||"",managedUsers:[],createdAt:new Date().toISOString()};
        if(all.empty){profile.role="admin";profile.teamId="admin";}
        else{profile.role="pending";profile.teamId="";}
        await db.collection("users").doc(fbUser.uid).set(profile);
        S.appUser=Object.assign({uid:fbUser.uid},profile);
        if(profile.role==="pending"){S.appReady=true;render();return;}
      }
      await loadClients();
      if(S.appUser.role==="admin")await loadAllUsers();
      S.appReady=true;
      migrateFromLocalStorage();
      render();
    }catch(err){console.error("Auth error:",err);S.appReady=true;render();}
  } else {
    S.appUser=null;S.appReady=true;S.clients=[];render();
  }
});
async function signInWithGoogle(){var p=new firebase.auth.GoogleAuthProvider();try{await auth.signInWithPopup(p);}catch(e){alert("Erro ao entrar: "+e.message);}}
async function signInWithEmail(){var em=document.getElementById("login-email").value.trim(),pw=document.getElementById("login-pw").value;if(!em||!pw){alert("Preencha e-mail e senha.");return;}try{await auth.signInWithEmailAndPassword(em,pw);}catch(e){alert("Erro: "+(e.code==="auth/wrong-password"||e.code==="auth/user-not-found"?"E-mail ou senha incorretos.":e.message));}}
async function doSignOut(){if(!confirm("Sair do Dashboard?"))return;if(S.clockInterval)clearInterval(S.clockInterval);await auth.signOut();}

async function loadClients(){
  try{
    var q=db.collection("clients");
    if(S.appUser.role==="analyst")q=q.where("ownerId","==",S.appUser.uid);
    else if(S.appUser.role==="leader"){var uids=[S.appUser.uid].concat(S.appUser.managedUsers||[]);q=q.where("ownerId","in",uids.slice(0,10));}
    var snap=await q.get();
    S.clients=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    S.clients=migrateClients(S.clients);
  }catch(e){console.error("Load clients:",e);S.clients=[];}
}
async function loadAdminLog(){try{var snap=await db.collection('admin_log').orderBy('at','desc').limit(100).get();S.adminLog=snap.docs.map(function(d){return d.data();});}catch(e){console.error('loadAdminLog:',e);S.adminLog=[];}}
async function loadAllUsers(){try{var s=await db.collection("users").get();S.allUsers=s.docs.map(function(d){return Object.assign({uid:d.id},d.data());});}catch(e){console.error(e);}}
async function saveState(){
  if(!S.appUser||S.appUser.role==="pending")return;
  var c=S.sel!==null?S.clients[S.sel]:null;if(!c)return;
  try{var d=JSON.parse(JSON.stringify(c));if(!d.ownerId)d.ownerId=S.appUser.uid;await db.collection("clients").doc(c.id).set(d);}catch(e){console.error("Save:",e);}
}
async function deleteClientFromDB(cid){try{await db.collection("clients").doc(cid).delete();}catch(e){console.error(e);}}
async function saveUserProfile(uid,data){try{await db.collection("users").doc(uid).update(data);}catch(e){console.error(e);}}
async function migrateFromLocalStorage(){
  var old=null;try{old=JSON.parse(localStorage.getItem("stays_cs_v4"))||JSON.parse(localStorage.getItem("stays_cs_v3"));}catch(e){}
  if(!old||!old.clients||!old.clients.length||S.clients.length>0)return;
  if(!confirm("Detectamos "+old.clients.length+" clientes salvos localmente. Importar para a nuvem?"))return;
  for(var i=0;i<old.clients.length;i++){var c=old.clients[i];c.ownerId=S.appUser.uid;if(!c.id)c.id=uid();c=migrateClient(c);await db.collection("clients").doc(c.id).set(JSON.parse(JSON.stringify(c)));S.clients.push(c);}
  localStorage.removeItem("stays_cs_v4");localStorage.removeItem("stays_cs_v3");render();
}

// Categorias e pesos: Risco 5, Financeiro 4, Distribuição 3,

var HEALTH_WEIGHTS={risco:5,financeiro:4,distribuicao:3,crescimento:2,digital:2,engajamento:1};
// Itens de humor (carinha) por categoria — chaves batem com wizFaces
var HEALTH_HUMOR_CATS={
  crescimento:['units','occupation'],
  digital:['domain','site','photos_desc','payment'],
  distribuicao:['channels','price','chperf','usab'],
  financeiro:['nego'],
  risco:['nps','cases','notifs'],
  engajamento:['financial','operational','appcenter']
};
function humorTo100(h){return Math.round((h/4)*100);}
// converte estado de contato (termômetro de atividades do analista) em nota
function contactScore(c){var d=getDaysWithoutContact(c);if(d===null)return 20;if(d<=30)return 100;if(d<=60)return 60;return 20;}
// atividade registrada nos últimos 90 dias
function activityScore(c){var last=getLastActivity(c);if(!last)return 30;var d=Math.floor((Date.now()-new Date(last.date))/(1000*60*60*24));return d<=90?100:40;}
// nota do financeiro do cliente (inadimplência)
function inadScore(c){
  if(isInadimplente(c))return 0;
  var lf=getLatestFollow(c);
  if(lf&&lf.answers&&lf.answers.inadimplencia_opt==='sim')return 40;
  return 100;
}
// DIAS SEM ATIVIDADE (cliente sem logar no sistema — vem da planilha, editável)
// 0-6 saudável (100) · 7-14 atenção (55) · 15-29 ruim (30) · 30+ péssimo (0)
function getDaysInactive(c){var v=(c&&c.daysInactive!==undefined&&c.daysInactive!==null&&c.daysInactive!=='')?parseInt(c.daysInactive):null;return (v!==null&&!isNaN(v))?v:null;}
function inactivityScore(c){var d=getDaysInactive(c);if(d===null)return null;if(d<=6)return 100;if(d<=14)return 55;if(d<=29)return 30;return 0;}
function inactivityLevel(c){var d=getDaysInactive(c);if(d===null)return null;if(d<=6)return'ok';if(d<=14)return'warn';return'risk';}
// NPS 1-2 com DECAIMENTO TEMPORAL a partir da data da avaliação (Q17 nps_date)
// <3 meses: trava vermelha + Péssimo · 3-4 meses: Ruim · >4 meses: Neutro
function npsRiskInfo(f){
  if(!f||!f.answers)return{low:false,trava:false,humor:null};
  var sc=f.answers.nps_score?+f.answers.nps_score:null;
  if(sc===null||sc>2)return{low:false,trava:false,humor:null};
  var dateStr=f.answers.nps_date;
  if(!dateStr)return{low:true,trava:true,humor:0}; // sem data: trata como recente
  var months=(Date.now()-new Date(dateStr))/(1000*60*60*24*30.44);
  if(months<3)return{low:true,trava:true,humor:0};      // recente: Péssimo + trava
  if(months<4)return{low:true,trava:false,humor:1};     // 3-4 meses: Ruim
  return{low:true,trava:false,humor:2};                 // >4 meses: Neutro
}
// Calcula a nota (0-100) de cada categoria + saúde geral ponderada + cor separada
function calcHealthV2(c){
  var f=getLatestFollow(c);
  var eff=(f&&f.wizard)?Object.assign({},f.humors||{}):{};
  // Ajuste do NPS por decaimento temporal (sobrescreve o humor de nps salvo)
  var npsInfo=npsRiskInfo(f);
  if(npsInfo.humor!==null)eff.nps=npsInfo.humor;
  var cats={};
  Object.keys(HEALTH_HUMOR_CATS).forEach(function(cat){
    var parts=[];
    HEALTH_HUMOR_CATS[cat].forEach(function(k){
      if(eff[k]!==undefined&&eff[k]!==null)parts.push(humorTo100(eff[k]));
    });
    if(cat==='financeiro')parts.push(inadScore(c));
    if(cat==='risco'){
      if(isChurnAlert(c))parts.push(0);
      var inact=inactivityScore(c);if(inact!==null)parts.push(inact);
    }
    if(cat==='engajamento'){parts.push(contactScore(c));parts.push(activityScore(c));}
    cats[cat]=parts.length?Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length):null;
  });
  var wsum=0,acc=0;
  Object.keys(HEALTH_WEIGHTS).forEach(function(cat){
    if(cats[cat]!==null){acc+=cats[cat]*HEALTH_WEIGHTS[cat];wsum+=HEALTH_WEIGHTS[cat];}
  });
  var score=wsum?Math.round(acc/wsum):100;
  // ── TRAVAS E COR ──────────────────────────────────────────────
  // Riscos VERMELHOS: churn ativo, NPS 1-2 recente (<3m), 30+ dias sem atividade
  var diasInativo=getDaysInactive(c);
  var abandono=(diasInativo!==null&&diasInativo>=30);
  var redRisk=isChurnAlert(c)||npsInfo.trava||abandono;
  var inad=isInadimplente(c);
  // Cor: inadimplência sozinha = laranja; qualquer risco vermelho (ou inad+risco) = vermelho
  var color;
  if(redRisk||(inad&&redRisk))color='risk';
  else if(inad)color='warn';
  else color=healthBand(score);
  // Se há risco vermelho, a nota também é puxada pra faixa vermelha
  if(redRisk)score=Math.min(score,30);
  else if(inad)score=Math.min(score,55); // inadimplência sozinha trava no máx. em atenção
  return {score:score,cats:cats,color:color,redRisk:redRisk,inad:inad};
}
function healthBand(s){return s>=70?'ok':(s>=40?'warn':'risk');}
// SCORE PRÓPRIO DO FOLLOW — só os humores daquele follow, sem dados ao vivo do cliente.
// Aplica a trava de NPS 1-2 com decaimento temporal (a data está no próprio follow).
function calcFollowScore(f){
  if(!f||!f.wizard)return null;
  var eff=Object.assign({},f.humors||{});
  var npsInfo=npsRiskInfo(f);
  if(npsInfo.humor!==null)eff.nps=npsInfo.humor;
  var cats={};
  Object.keys(HEALTH_HUMOR_CATS).forEach(function(cat){
    var parts=[];
    HEALTH_HUMOR_CATS[cat].forEach(function(k){
      if(eff[k]!==undefined&&eff[k]!==null)parts.push(humorTo100(eff[k]));
    });
    cats[cat]=parts.length?Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length):null;
  });
  var wsum=0,acc=0;
  Object.keys(HEALTH_WEIGHTS).forEach(function(cat){
    if(cats[cat]!==null){acc+=cats[cat]*HEALTH_WEIGHTS[cat];wsum+=HEALTH_WEIGHTS[cat];}
  });
  var score=wsum?Math.round(acc/wsum):null;
  if(score===null)return null;
  var color=healthBand(score);
  if(npsInfo.trava){score=Math.min(score,30);color='risk';} // NPS 1-2 recente derruba o follow
  return {score:score,color:color,cats:cats};
}
function healthColor(c){var f=getLatestFollow(c);if(f&&f.wizard)return calcHealthV2(c).color;return healthBand(calcScore(c));}

function followScoreBadge(f){

  var bg=fs.color==='risk'?'#fde8e8':(fs.color==='warn'?'#fff3e0':'#e8f5ec');
  return '<span style="display:inline-flex;align-items:center;gap:5px;background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:14px;padding:2px 10px;font-size:12px;font-weight:700" title="Score deste follow">'+fs.score+'</span>';
}
function calcScore(c){
  var f=getLatestFollow(c);if(!f)return 100;
  if(f.wizard)return calcHealthV2(c).score;
  var s=100,type=f.type||"first";
  IND.filter(function(i){return i.show==="both"||i.show===type;}).forEach(function(ind){var v=f.indicators[ind.key];if(!v)return;if(v.status==="risk")s+=ind.w.risk;else if(v.status==="warn")s+=ind.w.warn;});
  (c.contacts||[]).slice(-10).forEach(function(ct){if(ct.type==="churn")s-=25;else if(ct.impact==="positive")s+=4;else if(ct.impact==="negative")s-=8;});
  s=Math.max(0,Math.min(100,Math.round(s)));
  if(f.doingWell)s=Math.max(s,80);
  return s;
}

function fuSt(c){var f=getLatestFollow(c);if(!f||!f.date)return{label:"Sem data",cls:"fu-warn",days:null};var diff=Math.floor((Date.now()-new Date(f.date))/86400000),due=70-diff;if(due>14)return{label:due+"d",cls:"fu-ok",days:due};if(due>=0)return{label:due+"d (em breve)",cls:"fu-warn",days:due};return{label:"Vencido "+(-due)+"d",cls:"fu-overdue",days:due};}

function detectSt(q,a){var yes=/^sim/.test(a),no=/^n[ao]o/.test(a),never=/nunca|jamais/.test(a);if(q.includes("inadimpl"))return(no||never)?"ok":(yes?"risk":"na");if(q.includes("cancelamento")||q.includes("nps")){if(never||/nunca teve/.test(a))return"ok";if(yes||/pediu|solicitou/.test(a))return"risk";}if(q.includes("fuso")){if(yes||/correto/.test(a))return"ok";if(no||/incorreto/.test(a))return"risk";}if(q.includes("caso")||q.includes("n2")){if(no||/nao tem|sem casos/.test(a))return"ok";if(/n2|website/.test(a))return"risk";if(yes||/aberto/.test(a))return"warn";}if(q.includes("ocup")){var p=a.match(/(\d+)%/);if(p){var n=parseInt(p[1]);return n<30?"risk":(n<60?"warn":"ok");}if(/boa|alta|otima/.test(a))return"ok";if(/baixa|ruim/.test(a))return"risk";}if(q.includes("foto")||q.includes("descric"))return yes?"ok":(no?"warn":"na");if(q.includes("personaliz")||q.includes("site")){if(/bem personalizado|ativo|possui/.test(a)||yes)return"ok";return no?"warn":"na";}if(q.includes("domin")||q.includes("migra"))return yes?"ok":(no?"warn":"na");if(q.includes("financeiro")||q.includes("operacional")){if(/nao tem acesso|nao utiliza/.test(a))return"na";return yes?"ok":"na";}if(q.includes("unidade")){if(/diminuiu|reduziu|perdeu/.test(a))return"risk";if(/aumentou|cresceu/.test(a))return"ok";return"ok";}if(q.includes("preco")||q.includes("competit")){if(/abaixo/.test(a))return"warn";if(/muito acima|bem acima/.test(a))return"risk";if(/competitiv|adequado/.test(a))return"ok";}if(q.includes("canal")||q.includes("listing")){if(/nao conectado|desconect|queda/.test(a))return"warn";if(/todos|conectado/.test(a))return"ok";}if(q.includes("pagamento")){if(/stripe|paypal|mercado pago|getnet/.test(a))return"ok";if(no||/nao tem/.test(a))return"risk";}if(q.includes("atividade")||q.includes("acesso")){if(/todo dia|diariamente/.test(a))return"ok";if(/30 dias|um mes/.test(a))return"risk";if(/7 dias/.test(a))return"warn";}return"na";}

function getDaysWithoutContact(c){var last=getLastActivity(c);if(!last)return null;var diff=Math.floor((Date.now()-new Date(last.date))/(1000*60*60*24));return diff;}
function inactivityHTML(c){var d=getDaysInactive(c);if(d===null)return'<span class="thermo" style="background:var(--surf2);color:var(--t3)">—</span>';var lv=inactivityLevel(c);var cls=lv==='ok'?'thermo-green':(lv==='warn'?'thermo-yellow':'thermo-red');return'<span class="thermo '+cls+'" title="Dias sem o cliente logar no sistema">'+d+'d</span>';}
function thermoHTML(c){var days=getDaysWithoutContact(c);if(days===null)return'<span class="thermo thermo-red" title="Sem atividade registrada">Sem contato</span>';if(days===0)return'<span class="thermo thermo-green">Hoje</span>';var cls=days<=30?'thermo-green':(days<=60?'thermo-yellow':'thermo-red');return'<span class="thermo '+cls+'">'+days+'d</span>';}
function getActiveReminders(c){return(c.reminders||[]).filter(function(r){return!r.done&&!r.archived;});}
function getOverdueReminders(c){var today=new Date().toISOString().split('T')[0];return getActiveReminders(c).filter(function(r){return r.dueDate&&r.dueDate<today;});}
function reminderDots(ci,c){var rems=getActiveReminders(c);if(!rems.length)return'';var hasRetorno=rems.some(function(r){return r.type==='retorno';});var hasProativo=rems.some(function(r){return r.type==='proativo';});var dots='<span style="display:inline-flex;gap:3px;align-items:center;cursor:pointer" data-ci="'+ci+'" data-tab="reminders" onclick="openPanel(this)" title="Ver lembretes">';if(hasRetorno)dots+='<span class="rem-dot rem-dot-retorno" title="Lembrete de retorno"></span>';if(hasProativo)dots+='<span class="rem-dot rem-dot-proativo" title="Lembrete proativo"></span>';return dots+'</span>';}
function openPanel(btn){openSlidePanel(+btn.getAttribute("data-ci"),btn.getAttribute("data-tab"));}
function openSlidePanel(ci,tab){S.slidePanel=ci;S.slidePanelTab=tab||'activities';S.slideAddOpen=false;render();}
function closeSlidePanel(){S.slidePanel=null;S.slideAddOpen=false;render();}
function toggleSlidePanelTab(tab){S.slidePanelTab=tab;S.slideAddOpen=false;render();}
function toggleSlideAdd(){S.slideAddOpen=!S.slideAddOpen;render();}

function svgIcon(name,size,cls){
  size=size||16;cls=cls||'';
  if(ICON_STROKE[name]){
    return '<svg class="'+cls+'" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:inline-block;vertical-align:middle;flex-shrink:0">'+ICON_STROKE[name]+'</svg>';
  }
  var p=ICON_PATHS[name];if(!p)return '';
  return '<svg class="'+cls+'" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle;flex-shrink:0">'+p+'</svg>';
}

function wizFaces(qkey,auto,score){
  if(!score)return '';
  if(!S.wiz.autoHumors)S.wiz.autoHumors={};
  S.wiz.autoHumors[qkey]=auto;
  var cur=S.wiz.humors[qkey];
  var hasOverride=(cur!==undefined&&cur!==null);
  var active=hasOverride?cur:auto;
  var html='<div class="wiz-humor"><div class="wiz-humor-lbl">Humor desta pergunta <span style="color:var(--t3);font-weight:400">(automático · clique para alterar)</span></div><div class="wiz-faces">';
  FKEYS.forEach(function(k,i){
    var fc=FCOLORS[k];
    var isActive=active===i;
    var isAuto=!hasOverride&&auto===i;
    var style='background:'+fc.bg+';border-color:'+fc.bd+';color:'+fc.tx+';'+(isActive?'border-width:2px':'');
    var cls='wiz-face-btn'+(isAuto?' wf-auto':'');
    html+='<div class="'+cls+'" style="'+style+'" onclick="wizSetH(\''+qkey+'\','+i+')">'+face(k,18)+' '+FLABELS[i]+(isAuto?'<span style="font-size:9px;opacity:.6;margin-left:3px;border:1px dashed currentColor;padding:0 4px;border-radius:3px">auto</span>':'')+'</div>';
  });
  return html+'</div></div>';
}
function wizSetH(key,level){
  S.wiz.humors[key]=level;
  if(S.editFollow)S.editFollowDirty=true;
  render();
}
function wizA(key,val){
  S.wiz.answers[key]=val;
  if(S.editFollow)S.editFollowDirty=true;
  render();
}
function wizAText(key,val){
  S.wiz.answers[key]=val;
  if(S.editFollow)S.editFollowDirty=true;
}
function wizNav(step,total){
  var pct=Math.round((step/total)*100);
  return '<div class="wiz-progress"><div class="wiz-progress-fill" style="width:'+pct+'%"></div></div>';
}
function wizBtnNav(step,total,canNext){
  var isFirst=step===0;
  var isLast=step===total-1;
  return '<div class="wiz-nav">'
    +(isFirst?'<span></span>':'<button class="btn btn-sm" onclick="wizGo('+(step-1)+')">← Anterior</button>')
    +'<span class="wiz-counter">'+( step+1)+' / '+total+'</span>'
    +(isLast?'<button class="btn-primary btn-sm" onclick="wizFinish()">'+svgIcon('check',12)+' Concluir</button>':'<button class="btn-primary btn-sm" onclick="wizGo('+(step+1)+')" '+(canNext===false?'disabled':'')+'>Próxima →</button>')
    +'</div>';
}
function wizAutoSave(){
  var ci=S.sel;var c=S.clients[ci];
  if(!c)return;
  c.wizDraft={step:S.wiz.step,type:S.wiz.type,answers:Object.assign({},S.wiz.answers),humors:Object.assign({},S.wiz.humors),autoHumors:Object.assign({},S.wiz.autoHumors||{}),savedAt:new Date().toISOString()};
  saveState();
}
function wizExitConfirm(){
  if(confirm('Você ainda não terminou seu follow-up. Tem certeza que deseja voltar à página anterior?')){
    wizAutoSave();
    goBackToClient();
  }
}
function wizGo(step){S.wiz.step=step;wizAutoSave();render();}
function wizLbl(n,total,hint,icon){
  return '<div class="wiz-step-lbl"><span style="font-size:18px">'+icon+'</span>Pergunta '+(n+1)+' de '+total+'</div>'
    +(hint?'<div class="wiz-hint">'+svgIcon('pin',14)+' Verificar: '+hint+'</div>':'');
}

function wizQ1(){
  var a=S.wiz.answers;
  var isRec=S.wiz.type==='recurring';
  // Pré-preenche o total de unidades a partir do perfil do cliente (editável)
  if((a.units_count===undefined||a.units_count===''||a.units_count===null)&&!isRec){
    var _cli=S.clients[S.sel];
    if(_cli&&_cli.units!==undefined&&_cli.units!==null&&_cli.units!=='')a.units_count=+_cli.units;
  }
  var prevCount=(isRec&&S.wiz.prevAnswers)?+S.wiz.prevAnswers.units_count||0:0;
  var prevBanner=(isRec&&prevCount)?'<div class="wiz-info-banner">'+svgIcon('chart',14)+' No último follow ('+formatDate(S.wiz.prevFollowDate||'')+'): <strong>'+prevCount+' unidades</strong></div>':'';
  // Auto-detect change on recurring based on current vs previous
  if(isRec&&prevCount&&a.units_count!==undefined&&a.units_count!==''){
    var cur=+a.units_count;
    if(cur>prevCount){a.units_changed='ganhou';a.units_delta=cur-prevCount;}
    else if(cur<prevCount){a.units_changed='perdeu';a.units_delta=prevCount-cur;}
    else{a.units_changed='nao';a.units_delta=0;}
  }
  // Humor calc: percentage based on previous base (recurring) or on delta input (first)
  var auto=2;
  var base=isRec?prevCount:((+a.units_count||0)-((a.units_changed==='ganhou'?1:-1)*(+a.units_delta||0)));
  if(a.units_changed==='ganhou'&&a.units_delta){
    var pctG=prevCount>0?(+a.units_delta/prevCount):(base>0?(+a.units_delta/base):1);
    auto=pctG>0.2?4:3;
  }
  if(a.units_changed==='perdeu'&&a.units_delta){
    var pctP=prevCount>0?(+a.units_delta/prevCount):(base>0?(+a.units_delta/base):1);
    auto=pctP>0.2?0:1;
  }
  var html='<div class="wiz-card">';
  html+='<div class="wiz-q">Quantas unidades o cliente tem atualmente?</div>';
  html+='<div class="wiz-q-sub">Coloque o número ATUAL de unidades (já considerando o que foi adicionado ou removido).</div>';
  html+=prevBanner;
  html+='<input class="wiz-input wiz-input-sm" type="number" placeholder="Ex: 40" value="'+(a.units_count||'')+'" oninput="wizAText(\'units_count\',+this.value)" onchange="wizUnitsChanged()" style="margin-bottom:1.25rem">';
  if(isRec){
    // On recurring, show auto-detected change (read-only info)
    if(a.units_changed==='ganhou')html+='<div class="wiz-info-banner" style="border-color:#22c55e;background:#dcfce7;color:#166534">'+svgIcon('arrow_up',14)+' Detectado automaticamente: <strong>ganhou '+a.units_delta+' unidade(s)</strong> desde o último follow.</div>';
    else if(a.units_changed==='perdeu')html+='<div class="wiz-info-banner" style="border-color:#ef4444;background:#fee2e2;color:#7f1d1d">'+svgIcon('arrow_down',14)+' Detectado automaticamente: <strong>perdeu '+a.units_delta+' unidade(s)</strong> desde o último follow.</div>';
    else if(a.units_changed==='nao'&&a.units_count)html+='<div class="wiz-info-banner">'+svgIcon('columns',14)+' Sem mudança no número de unidades desde o último follow.</div>';
  }else{
    // First analysis: manual selection
    html+='<div class="wiz-sub-section"><div class="wiz-sub-q">As unidades aumentaram ou diminuíram recentemente?</div>';

function wizCurrentSeason(){
  var cities=S.wiz.answers.cities||[];
  if(!cities.length||!cities[0].season_high_start)return null;
  var months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var now=new Date().getMonth();
  var c=cities[0];
  var hs=months.indexOf(c.season_high_start);
  var he=months.indexOf(c.season_high_end);
  if(hs<0||he<0)return null;
  var inHigh=hs<=he?(now>=hs&&now<=he):(now>=hs||now<=he);
  return inHigh?'high':'low';
}

function wizFollowSeason(a){
  var cities=a.cities||[];
  if(!cities.length||!cities[0].season_high_start)return null;
  var months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var now=new Date().getMonth();var c=cities[0];
  var hs=months.indexOf(c.season_high_start);var he=months.indexOf(c.season_high_end);
  if(hs<0||he<0)return null;
  var inHigh=hs<=he?(now>=hs&&now<=he):(now>=hs||now<=he);
  return inHigh?'high':'low';
}

function followTimelineCharts(follows){
  // Metrics to track over time
  var metrics=[
    {key:'units_count',label:'Unidades',color:'#3b82f6',get:function(f){return +f.answers.units_count||0;}},
    {key:'channels',label:'Canais conectados',color:'#22c55e',get:function(f){return (f.answers.channels||[]).filter(function(x){return x.active;}).length;}},
    {key:'occupation',label:'Ocupação (nível)',color:'#f59e0b',get:function(f){var o=f.answers.occupation_option;return o!==undefined&&o!==null?(4-o):0;}}
  ];
  var html='';
  metrics.forEach(function(m){
    var values=follows.map(m.get);
    var maxV=Math.max.apply(null,values.concat([1]));
    var minV=Math.min.apply(null,values.concat([0]));
    var range=maxV-minV||1;
    var w=Math.max(follows.length*120,400);
    var h=180;var pad=30;
    var chartW=w-pad*2;var chartH=h-pad*2;
    var pts=values.map(function(v,i){
      var x=pad+(follows.length>1?(i/(follows.length-1))*chartW:chartW/2);
      var y=pad+chartH-((v-minV)/range)*chartH;
      return {x:x,y:y,v:v};
    });
    var pathD=pts.map(function(p,i){return (i===0?'M':'L')+p.x+' '+p.y;}).join(' ');
    html+='<div class="card" style="padding:1.25rem;margin-bottom:1rem;overflow-x:auto">';
    html+='<div style="font-size:13px;font-weight:600;color:var(--t);margin-bottom:1rem;display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:50%;background:'+m.color+';display:inline-block"></span>'+m.label+'</div>';
    html+='<svg width="'+w+'" height="'+h+'" style="min-width:100%">';
    // Grid lines
    for(var g=0;g<=4;g++){var gy=pad+(chartH/4)*g;html+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(w-pad)+'" y2="'+gy+'" stroke="var(--bd)" stroke-width="0.5"/>';}
    // Line path
    html+='<path d="'+pathD+'" stroke="'+m.color+'" stroke-width="2" fill="none"/>';
    // Points + labels
    pts.forEach(function(p,i){
      html+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+m.color+'"/>';
      html+='<text x="'+p.x+'" y="'+(p.y-10)+'" text-anchor="middle" font-size="11" font-weight="600" fill="var(--t)">'+p.v+'</text>';
      html+='<text x="'+p.x+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="var(--t3)">'+formatDate(follows[i].date).slice(0,5)+'</text>';
    });
    html+='</svg></div>';
  });
  return html;
}

  humorKeys.forEach(function(hk,ki){
    var groupX=40+ki*groupW;
    var barW=Math.min(18,(groupW-20)/follows.length);
    follows.forEach(function(f,fi){
      var lvl=(f.humors&&f.humors[hk.key]!==undefined&&f.humors[hk.key]!==null)?f.humors[hk.key]:null;
      if(lvl===null)return;
      var barH=(lvl/4)*chartH;
      var x=groupX+fi*(barW+2);

      html+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+barH+'" fill="'+colors[fi%colors.length]+'" rx="2"/>';
    });

  });
  html+='</svg></div>';
  return html;
}

  {key:'promocoes',label:'Promoções ativas',opts:['Nenhuma estratégia promocional em temporada crítica','Falta promoção em período que pediria','Sem promoções, mas sem necessidade no momento','Alguma promoção ativa, boa direção','Promoções ativas e bem alinhadas à temporada']}
];
function wizUsabMajority(){
  var a=S.wiz.answers;
  var counts=[0,0,0,0,0];var answered=0;
  WIZ_USAB_ITEMS.forEach(function(it){var v=a['usab_'+it.key];if(v!==undefined&&v!==null){counts[v]++;answered++;}});
  if(answered===0)return 2;
  // find the level with the most votes; tie -> lean to the middle (Neutro=2)
  var max=Math.max.apply(null,counts);
  var leaders=[];counts.forEach(function(n,i){if(n===max)leaders.push(i);});
  if(leaders.length===1)return leaders[0];
  // tie: pick the one closest to the middle (2)
  leaders.sort(function(x,y){return Math.abs(x-2)-Math.abs(y-2);});
  return leaders[0];
}

function wizAutoAttention(){

function deleteChurnHistory(ci,idx){

bro'.split(',').map(function(m,i){return'<option value="'+m+'">'+m+'</option>';}).join('')+'</select></div><div class="form-row"><label class="form-lbl">Ano <span style="color:var(--rd)">*</span></label><select id="ii-year"><option value="">Selecionar...</option>'+(function(){var o='';for(var y=2023;y<=2027;y++)o+='<option value="'+y+'"'+(y===new Date().getFullYear()?' selected':'')+'>'+y+'</option>';return o;})()+'</select></div></div><div class="form-row"><label class="form-lbl">Valor (opcional)</label><input id="ii-amount" type="text" placeholder="Ex: $ 1.500"></div><div class="form-row"><label class="form-lbl">Motivo (opcional)</label><textarea id="ii-note" rows="2" placeholder="Por que o cliente ficou inadimplente?"></textarea></div></div><div class="modal-ftr"><button class="btn" onclick="closeM()">Fechar</button><button class="btn-inadim" onclick="saveInadimplencia('+ci+')">Adicionar fatura</button></div></div>';}

function mContact(){return'<div class="modal-box"><div class="modal-title">Registrar contato externo</div><div class="form-row"><label class="form-lbl">Tipo</label><select id="ct"><option value="meeting">Reuniao</option><option value="whatsapp">WhatsApp</option><option value="email">E-mail</option><option value="churn">Alerta de Churn</option></select></div><div class="form-row"><label class="form-lbl">Data</label><input id="cd" type="date" value="'+new Date().toISOString().split("T")[0]+'"></div><div class="form-row"><label class="form-lbl">Impacto</label><select id="ci"><option value="positive">Positivo</option><option value="neutral">Neutro</option><option value="negative">Negativo</option></select></div><div class="form-row"><label class="form-lbl">Resumo do contato</label><textarea id="cs" style="height:110px;resize:vertical" placeholder="O que foi discutido? Qual o resultado?"></textarea></div><div class="flex" style="justify-content:flex-end;gap:8px;margin-top:1.25rem"><button class="btn" onclick="closeM()">Cancelar</button><button class="btn-primary" onclick="saveContact()">Salvar</button></div></div>';}

function mAddUser(){return'<div class="modal-box"><div class="modal-title">Informar novo usuario</div><div class="import-tip">O usuario deve acessar o site e fazer login com o e-mail informado abaixo. O perfil sera criado automaticamente como Pendente ate voce aprovar aqui.</div><div class="form-row"><label class="form-lbl">Nome completo</label><input id="un" type="text" placeholder="Ex: Maria Beatriz"></div><div class="form-row"><label class="form-lbl">E-mail de acesso</label><input id="ue" type="text" placeholder="maria@stays.com.br"></div><div class="form-row"><label class="form-lbl">Funcao inicial</label><select id="ur"><option value="analyst">Analista</option><option value="leader">Lider</option></select></div><div class="flex" style="justify-content:flex-end;gap:8px;margin-top:1.25rem"><button class="btn" onclick="closeM()">Cancelar</button><button class="btn-primary" onclick="infoNewUser()">OK, entendi</button></div></div>';}
function mSettings(){return'<div class="modal-box"><div class="modal-title">Configuracoes</div><div class="form-row"><label class="form-lbl">Chave de API Anthropic (para Gerar com API)</label><input id="sk" type="password" value="'+e(S.apiKey)+'" placeholder="sk-ant-api03-..."></div><div class="form-row"><label class="form-lbl" style="color:var(--t3);font-weight:400;font-size:11px">A chave fica salva apenas neste navegador.</label></div><div class="flex" style="justify-content:flex-end;gap:8px;margin-top:1.25rem"><button class="btn" onclick="closeM()">Fechar</button><button class="btn-primary" onclick="saveSettings()">Salvar</button></div></div>';}
// ============================================================
// HANDLERS
// ============================================================
function openClientFollows(i){S.sel=i;S.view="client";S.clientTab="follows";S.genText="";S.importMsg="";S.citiesOpen=false;render();}
function toggleDropdown(id,ev){ev.stopPropagation();var el=document.getElementById(id);if(!el)return;var isOpen=el.style.display==="block";document.querySelectorAll(".dd-menu").forEach(function(d){d.style.display="none";});if(!isOpen){el.style.display="block";setTimeout(function(){document.addEventListener("click",function h(){el.style.display="none";document.removeEventListener("click",h);},{once:true});},0);}}
function goBack(){S.view="dashboard";S.sel=null;S.selFollow=null;S.genText="";S.importMsg="";S.adminMode=false;render();}
function goBackToClient(){if(S.editFollow&&S.editFollowDirty&&!confirm("Você tem alterações não salvas nesta pergunta. Sair sem salvar?"))return;if(S.hasUnsavedChanges&&!confirm("Tem alteracoes nao salvas. Sair sem salvar?"))return;S.editFollow=null;S.editFollowDirty=false;S.hasUnsavedChanges=false;S.view="client";S.selFollow=null;S.genText="";S.importMsg="";render();}
function goArchived(){S.view="archived";render();}
function goAdminLog(){loadAdminLog().then(function(){S.view="adminlog";render();});}
function goAdmin(){S.view="admin";if(S.appUser.role==="admin")loadAllUsers().then(function(){render();});else render();}
function toggleAdminMode(){S.adminMode=!S.adminMode;if(S.adminMode)loadAllUsers().then(function(){render();});else render();}
function openClient(i){S.sel=i;S.view="client";S.clientTab="info";S.genText="";S.importMsg="";S.citiesOpen=false;render();}
function openFollow(fi){S.hasUnsavedChanges=false;S.editFollow=null;S.editFollowDirty=false;S.selFollow=fi;var c=S.clients[S.sel];var f=c.follows[fi];S.view=(f&&f.wizard)?"follow-view":"follow";S.genText="";S.importMsg="";render();}
function openM(n,arg){S.modal=n;S.modalArg=(arg!==undefined?arg:null);render();}
function closeM(){S.modal=null;S.churnEditMode=false;render();}
function toggleCitiesPanel(){S.citiesOpen=!S.citiesOpen;render();}

function addClient(){
  var name=document.getElementById("mn").value.trim();
  var slug=document.getElementById("mslug").value.trim().toLowerCase().replace(/\s+/g,"");
  var country=document.getElementById("mc").value;
  var units=document.getElementById("mu").value.trim();
  if(!name){alert("Informe o nome do cliente.");return;}
  if(!slug){alert("Informe a sigla do cliente.");return;}
  if(!country){alert("Selecione o pais dos anuncios.");return;}
  if(!units){alert("Informe o numero de unidades.");return;}
  var plan=document.getElementById("mpl").value,mrr=document.getElementById("mmrr").value.trim();
  var clientCountry=document.getElementById("mcl").value,clientCity=document.getElementById("mcly").value.trim();
  var categoria=document.getElementById('mcat').value;var onboardingStatus=document.getElementById('mst').value;var nc={id:uid(),name:name,slug:slug,country:country,plan:plan,units:units,mrr:mrr,clientCountry:clientCountry,clientCity:clientCity,categoria:categoria,onboardingStatus:onboardingStatus,keyContacts:[],contacts:[],follows:[],ownerId:S.appUser.uid};
  S.clients.push(nc);var ci=S.clients.length-1;
  db.collection("clients").doc(nc.id).set(JSON.parse(JSON.stringify(nc))).catch(function(err){console.error("Save new client:",err);});
  S.modal=null;openClient(ci);
}
function saveEditClient(){
  var c=S.clients[S.sel];
  var name=document.getElementById("en").value.trim();
  var units=document.getElementById("eu").value.trim();
  var country=document.getElementById("ec").value;
  if(!name){alert("Informe o nome.");return;}
  if(!units){alert("Informe as unidades.");return;}
  if(!country){alert("Selecione o pais.");return;}
  c.name=name;
  c.slug=document.getElementById("eslug").value.trim().toLowerCase().replace(/\s+/g,"");
  c.country=country;
  c.units=units;
  c.plan=document.getElementById("epl").value;
  c.mrr=document.getElementById("emrr").value.trim();
  var _edia=document.getElementById("edia");if(_edia)c.daysInactive=_edia.value.trim();
  c.clientCountry=document.getElementById("ecl").value;
  c.clientCity=document.getElementById("ecly").value.trim();
  c.categoria=document.getElementById("ecat").value;
  c.onboardingStatus=document.getElementById("est").value;
  saveState();showSaved();S.modal=null;render();
}
function showSaved(){S.savedMsg=true;render();setTimeout(function(){S.savedMsg=false;render();},2500);}
function saveFollow(){
  var ci=S.sel,c=S.clients[ci];
  var nf={id:uid(),date:document.getElementById("fd").value,type:document.getElementById("ft").value,indicators:mkInd(),doingWell:false};
  nf.indicators.ind_country={status:"na",notes:"",value:c.country||""};
  c.follows.push(nf);var fi=c.follows.length-1;
  saveState();S.modal=null;openFollow(fi);
}
function delClient(i){if(!confirm("Tem certeza que deseja excluir \""+S.clients[i].name+"\"?\n\nEsta ação é permanente e irá remover todos os dados, follow-ups e histórico do cliente. Não pode ser desfeita."))return;var cid=S.clients[i].id;S.clients.splice(i,1);deleteClientFromDB(cid);goBack();}
function delFollow(ci,fi){
  var c=S.clients[ci],f=c.follows[fi];
  if(!confirm("Tem certeza que deseja excluir este Follow-Up de "+formatDate(f.date)+"?"))return;
  S.undoFollow=JSON.parse(JSON.stringify(f));S.undoFollowIdx=fi;S.undoCI=ci;S.undoMsg="Follow-Up de "+formatDate(f.date)+" excluido.";
  c.follows.splice(fi,1);saveState();goBackToClient();S.clientTab="follows";render();
  setTimeout(function(){if(S.undoMsg){S.undoMsg="";S.undoFollow=null;render();}},10000);
}
function undoDelete(){if(!S.undoFollow||S.undoCI===null)return;S.clients[S.undoCI].follows.splice(S.undoFollowIdx,0,S.undoFollow);saveState();S.undoFollow=null;S.undoFollowIdx=null;S.undoCI=null;S.undoMsg="";render();}
function clearUndo(){S.undoMsg="";S.undoFollow=null;S.undoCI=null;render();}
function markDirty(){S.hasUnsavedChanges=true;render();}
function saveFollowChanges(){saveState();S.hasUnsavedChanges=false;showSaved();render();}
function setInd(ci,fi,key,st){if(!S.clients[ci].follows[fi].indicators[key])S.clients[ci].follows[fi].indicators[key]={status:"na",notes:""};S.clients[ci].follows[fi].indicators[key].status=st;S.genText="";markDirty();}
function noteInd(ci,fi,key,val){if(!S.clients[ci].follows[fi].indicators[key])S.clients[ci].follows[fi].indicators[key]={status:"na",notes:""};S.clients[ci].follows[fi].indicators[key].notes=val;S.hasUnsavedChanges=true;}
function noteIndVal(ci,fi,key,val){var ind=S.clients[ci].follows[fi].indicators;if(!ind[key])ind[key]={status:"na",notes:"",value:""};ind[key].notes=val;ind[key].value=val;S.hasUnsavedChanges=true;}
function setCountry(ci,fi,val){var ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_country)ind.ind_country={status:"na",notes:"",value:""};ind.ind_country.value=val;if(ind.ind_states){ind.ind_states.notes="";ind.ind_states.value="";}markDirty();}
function addState(ci,fi,sel){var val=sel.value;if(!val)return;var ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_states)ind.ind_states={status:"na",notes:"",value:""};var cur=(ind.ind_states.notes||ind.ind_states.value||"").split(",").map(function(s){return s.trim();}).filter(Boolean);if(!cur.includes(val))cur.push(val);var nv=cur.join(", ");ind.ind_states.notes=nv;ind.ind_states.value=nv;markDirty();}
function setCities(ci,fi,el){var parts=el.value.split(",").map(function(s){return s.trim();}).filter(Boolean);if(parts.length>10){el.value=parts.slice(0,10).join(", ");return;}var ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_cities)ind.ind_cities={status:"na",notes:"",value:""};ind.ind_cities.notes=el.value;ind.ind_cities.value=el.value;saveState();}
function setSeasonMonth(ci,fi,key,field,val){var ind=S.clients[ci].follows[fi].indicators;if(!ind[key])ind[key]={status:"na",notes:"",start:"",end:""};ind[key][field]=val;if(ind[key].start&&ind[key].end)ind[key].status="ok";markDirty();}
function markToday(fi){var c=S.clients[S.sel],f=c.follows[fi];if(!confirm("Isso vai alterar a data deste follow-up ("+formatDate(f.date)+") para hoje. Confirmar?"))return;c.follows[fi].date=new Date().toISOString().split("T")[0];saveState();render();}
function toggleWell(fi){S.clients[S.sel].follows[fi].doingWell=!S.clients[S.sel].follows[fi].doingWell;saveState();render();}
function saveContact(){var sum=document.getElementById("cs").value.trim();if(!sum){alert("Adicione um resumo do contato.");return;}var ct={id:uid(),type:document.getElementById("ct").value,date:document.getElementById("cd").value,impact:document.getElementById("ci").value,summary:sum};var c=S.clients[S.sel];if(!c.contacts)c.contacts=[];c.contacts.push(ct);if(ct.type==="churn"){var lf=getLatestFollow(c);if(lf&&lf.indicators)lf.indicators.churn_hist={status:"risk",notes:sum.slice(0,150)};}saveState();S.modal=null;S.genText="";render();}
function delContact(ci,i){if(!confirm("Remover este contato?"))return;S.clients[ci].contacts.splice(i,1);saveState();render();}
function saveKeyContact(){var name=document.getElementById("kn").value.trim();if(!name){alert("Informe o nome.");return;}var resp=document.getElementById("kresp")&&document.getElementById("kresp").checked;var kc={id:uid(),name:name,role:document.getElementById("kr").value.trim(),phone:document.getElementById("kp").value.trim(),email:document.getElementById("ke").value.trim(),responsible:!!resp};var c=S.clients[S.sel];if(!c.keyContacts)c.keyContacts=[];if(resp)c.keyContacts.forEach(function(k){k.responsible=false;});c.keyContacts.push(kc);saveState();S.modal=null;render();}
function delKeyContact(ci,i){if(!confirm("Remover este contato-chave?"))return;S.clients[ci].keyContacts.splice(i,1);saveState();render();}
function saveSettings(){S.apiKey=document.getElementById("sk").value.trim();localStorage.setItem("stays_api_key",S.apiKey);closeM();}
async function changeRole(uid,role){await saveUserProfile(uid,{role:role});await loadAllUsers();render();}
function infoNewUser(){var name=document.getElementById("un").value.trim(),email=document.getElementById("ue").value.trim();if(!name||!email){alert("Preencha nome e e-mail.");return;}alert("Perfeito! Informe "+name+" ("+email+") para acessar "+window.location.origin+" e fazer login com o Google ou criar uma conta com esse e-mail. Assim que o perfil for criado, ele aparecera aqui como Pendente para voce aprovar.");S.modal=null;render();}
function runImport(){var text=document.getElementById("imp").value.trim();if(!text)return;if(S.selFollow===null){alert("Abra um follow-up primeiro.");closeM();return;}var imported=importTextFn(text,S.sel,S.selFollow);saveState();S.modal=null;S.genText="";S.importMsg=imported>0?("OK: "+imported+" indicadores importados."):"Nenhum indicador reconhecido. Verifique o formato do texto.";render();}
function copyResult(){navigator.clipboard.writeText(S.genText).then(function(){S.copied=true;render();setTimeout(function(){S.copied=false;render();},2500);}).catch(function(){alert("Erro ao copiar. Selecione e copie manualmente.");});}
function buildPrompt(){
  var ci=S.sel,fi=S.selFollow,c=S.clients[ci],f=c.follows[fi],type=f.type||"first",isR=type==="recurring";
  var rows=IND.filter(function(i){return i.show==="both"||i.show===type;}).map(function(i){var v=f.indicators[i.key]||{status:"na",notes:""};var st=v.status==="ok"?"OK":(v.status==="warn"?"Atencao":(v.status==="risk"?"RISCO":"N/A"));return i.label+": "+st+(v.notes?" — "+v.notes:"");}).join("\n");
  var ctx=(c.contacts||[]).slice(-5).map(function(ct){return"["+ct.date+"] "+ct.type.toUpperCase()+" ("+ct.impact+"): "+ct.summary;}).join("\n");
  var season=getCurrentSeason(c);var seasonInfo=season?"Temporada atual: "+(season.current==="high"?"ALTA ("+season.highLabel+")":"BAIXA ("+season.highLabel+")"):"";
  return"Voce e analista senior de Customer Success da Stays (plataforma de gestao de aluguel por temporada).\n\nGere um texto de follow-up estruturado para colar no Chatter do Salesforce. Use o formato abaixo e seja conciso e profissional.\n\nFORMATO:\n1. Temporada e localizacao: [resposta]\n2. Unidades: [resposta]\n3. Canais e listings: [resposta]\n"+(isR?"4. Performance de canais: [resposta]\n5. Preco competitivo: [resposta]\n6. Ocupacao: [resposta]\n7. Last minute: [resposta]\n8. Atividade no sistema: [resposta]\n9. Cancelamento/NPS: [resposta]\n10. Casos abertos: [resposta]\n11. Negociacao de mensalidade: [resposta]\n12. Oportunidade de upgrade: [resposta]\n13. Proximos passos: [resposta]":"4. Dominio e site: [resposta]\n5. Canal de pagamento: [resposta]\n6. Inadimplencia: [resposta]\n7. Fotos e descricao: [resposta]\n8. Fuso horario: [resposta]\n9. Preco competitivo: [resposta]\n10. Ocupacao: [resposta]\n11. Last minute: [resposta]\n12. Atividade no sistema: [resposta]\n13. Cancelamento/NPS: [resposta]\n14. Casos abertos: [resposta]\n15. Modulo financeiro: [resposta]\n16. Oportunidade de upgrade: [resposta]\n17. Proximos passos: [resposta]")+"\n\nPontos de atencao:\n- [ponto]: [acao]\n\n"+(ctx?"Contatos recentes:\n"+ctx+"\n\n":"")+"DADOS DO CLIENTE:\nNome: "+c.name+"\nPais anuncios: "+getListingCountry(c)+"\nCliente mora em: "+c.clientCountry+(c.clientCity?" ("+c.clientCity+")":"")+"\nMRR: "+(c.mrr?formatMRR(c.mrr):"N/A")+"\nPlano: "+(PLAN_L[c.plan]||"N/A")+"\n"+seasonInfo+"\nScore de saude: "+calcScore(c)+"/100\n\nINDICADORES:\n"+rows+"\n\nResponda SOMENTE com o texto formatado. Sem introducao nem conclusao.";
}
function copyPrompt(){navigator.clipboard.writeText(buildPrompt()).then(function(){alert("Prompt copiado!\n\nAgora:\n1. Abra claude.ai em nova aba\n2. Cole e envie\n3. Copie a resposta e cole no Chatter do Salesforce");}).catch(function(){alert("Erro ao copiar.");});}
async function genApi(){if(!S.apiKey){openM("settings");return;}S.generating=true;S.genText="";render();try{var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:buildPrompt()}]})});var d=await r.json();S.genText=d.error?("Erro: "+d.error.message):(d.content&&d.content[0]&&d.content[0].text||"Resposta invalida.");}catch(err){S.genText="Erro de conexao: "+err.message;}S.generating=false;render();}



</script>
