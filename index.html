textarea.nf{width:100%;font-size:11px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--surf2);resize:vertical;min-height:44px;line-height:1.4;font-family:'Roboto',sans-serif;color:var(--t)}
textarea.nf:focus{outline:none;border-color:var(--b600);background:var(--surf)}
select.narrow{width:auto;font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--surf);color:var(--t)}
.view-toggle{display:flex;gap:4px;background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:3px;margin-bottom:1rem}

.contact-entry{border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--surf)}
.ce-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}.ctb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}

.htrack{flex:1;height:5px;border-radius:9999px;background:var(--surf3);overflow:hidden}.hfill{height:100%;border-radius:9999px;transition:width .3s}.hrow{display:flex;align-items:center;gap:8px;margin-top:5px}
.fu-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700}.fu-ok{background:var(--gn50);color:var(--gn600)}.fu-warn{background:var(--am50);color:var(--am600)}.fu-overdue{background:var(--rd50);color:var(--rd600)}
.toggle-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0}.tgl{width:42px;height:24px;background:var(--bd);border-radius:9999px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;margin-top:2px}.tgl.on{background:var(--b600)}.tgl::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}.tgl.on::after{left:20px}

.alert-red{background:var(--rd50);border:1px solid var(--rd600);color:var(--rd600)}.alert-amber{background:var(--am50);border:1px solid var(--am600);color:var(--am600)}.alert-green{background:var(--gn50);border:1px solid var(--gn600);color:var(--gn600)}

.chip-cur-low{background:var(--rd700);color:#fff;border:none;font-weight:700;font-size:13px;padding:5px 12px}

function loadState(){

function migrateData(state){
  (state.clients||[]).forEach(c=>{
    if(!c.follows){c.follows=[];if(c.indicators||c.lastFollowDate){const inds=c.indicators?ensureNewInds(c.indicators,c):mkInd();c.follows.push({id:uid(),date:c.lastFollowDate||new Date().toISOString().split('T')[0],type:c.analysisType||'first',indicators:inds,doingWell:c.doingWell||false});}delete c.indicators;delete c.analysisType;delete c.lastFollowDate;delete c.doingWell;}
    if(!c.keyContacts)c.keyContacts=[];if(c.units===undefined)c.units='';
    c.follows.forEach(f=>{f.indicators=ensureNewInds(f.indicators,c);});
  });
  return state;
}
function ensureNewInds(inds,c){
  if(!inds)inds={};
  IND.forEach(i=>{if(!inds[i.key]){const b={status:'na',notes:''};if(i.special==='season_high'||i.special==='season_low'){b.start='';b.end='';}if(i.special==='country'||i.special==='states'||i.special==='cities')b.value='';inds[i.key]=b;}});
  if(inds.ind_country&&!inds.ind_country.value&&c&&c.country)inds.ind_country.value=c.country;
  return inds;
}
function mkInd(){const o={};IND.forEach(i=>{const b={status:'na',notes:''};if(i.special==='season_high'||i.special==='season_low'){b.start='';b.end='';}if(i.special==='country'||i.special==='states'||i.special==='cities')b.value='';o[i.key]=b;});return o;}

// HELPERS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function monthName(m){if(!m)return'?';return MONTHS[parseInt(m)-1]||'?';}
function setTheme(t){S.theme=t;document.documentElement.className=t==='dark'?'th-dark':(t==='night'?'th-night':'');localStorage.setItem('stays_theme',t);}
function getFollowsSorted(c){if(!c.follows||!c.follows.length)return[];return[...c.follows].sort((a,b)=>new Date(b.date)-new Date(a.date));}
function getLatestFollow(c){return getFollowsSorted(c)[0]||null;}
function getPrevFollow(c){return getFollowsSorted(c)[1]||null;}
function calcScore(c){
  const f=getLatestFollow(c);if(!f)return 100;
  let s=100;const type=f.type||'first';
  IND.filter(i=>i.show==='both'||i.show===type).forEach(ind=>{const v=f.indicators[ind.key];if(!v)return;if(v.status==='risk')s+=ind.w.risk;else if(v.status==='warn')s+=ind.w.warn;});
  (c.contacts||[]).slice(-10).forEach(ct=>{if(ct.type==='churn')s-=25;else if(ct.impact==='positive')s+=4;else if(ct.impact==='negative')s-=8;});
  s=Math.max(0,Math.min(100,Math.round(s)));if(f.doingWell)s=Math.max(s,80);return s;
}
function hl(s){return s>=75?'ok':(s>=50?'warn':'risk');}
function fuSt(c){
  const f=getLatestFollow(c);if(!f||!f.date)return{label:'Sem data',cls:'fu-warn',days:null};
  const diff=Math.floor((Date.now()-new Date(f.date))/86400000),due=70-diff;
  if(due>14)return{label:due+'d',cls:'fu-ok',days:due};if(due>=0)return{label:due+'d (em breve)',cls:'fu-warn',days:due};
  return{label:'Vencido '+(-due)+'d',cls:'fu-overdue',days:due};
}
function catSt(c,cat){
  const f=getLatestFollow(c);if(!f)return'na';const type=f.type||'first';
  const sts=IND.filter(i=>i.cat===cat&&(i.show==='both'||i.show===type)).map(i=>f.indicators[i.key]?.status||'na');
  return sts.includes('risk')?'risk':(sts.includes('warn')?'warn':(sts.every(s=>s==='na')?'na':'ok'));
}
function getCurrentSeason(c){
  const f=getLatestFollow(c);if(!f)return null;
  const sh=f.indicators?.season_high,sl=f.indicators?.season_low;if(!sh?.start||!sh?.end)return null;
  const cur=new Date().getMonth()+1,hs=parseInt(sh.start),he=parseInt(sh.end);
  const inHigh=hs<=he?(cur>=hs&&cur<=he):(cur>=hs||cur<=he);
  return{current:inHigh?'high':'low',highLabel:monthName(hs)+' a '+monthName(he),lowLabel:(sl?.start&&sl?.end)?monthName(parseInt(sl.start))+' a '+monthName(parseInt(sl.end)):null};
}
function getCities(c){const f=getLatestFollow(c);if(f){const ic=f.indicators?.ind_cities;return ic?.value||ic?.notes||'';}return c.cities||'';}
function bdg(st,lbl){const m={ok:'OK',warn:'Atenção',risk:'Risco',na:'—'};const cls=st==='ok'?'b-ok':(st==='warn'?'b-warn':(st==='risk'?'b-risk':'b-na'));return'<span class="badge '+cls+'">'+(lbl||m[st]||st)+'</span>';}
function planBdg(plan){if(!plan||!PLAN_S[plan])return'<span class="badge b-na">—</span>';const ps=PLAN_S[plan];return'<span class="badge" style="background:'+ps.bg+';color:'+ps.c+'">'+PLAN_L[plan]+'</span>';}
function bdgSt(st){return{ok:'✅ OK',warn:'⚠ Atenção',risk:'🚨 Risco',na:'—'}[st]||st;}
function getComparison(c){
  const latest=getLatestFollow(c),prev=getPrevFollow(c);if(!latest||!prev)return null;
  const season=getCurrentSeason(c),inLow=season?.current==='low',rank={na:0,risk:1,warn:2,ok:3},changes=[];
  const type=latest.type||'first';
  IND.filter(i=>i.show==='both'||i.show===type).forEach(ind=>{
    const cs=latest.indicators[ind.key]?.status||'na',ps=prev.indicators[ind.key]?.status||'na';
    if(cs==='na'&&ps==='na')return;
    const improved=rank[cs]>rank[ps],worsened=rank[cs]<rank[ps],expected=worsened&&inLow&&SEASON_INDS.includes(ind.key);
    changes.push({ind,cs,ps,improved,worsened,expected});
  });
  return{latest,prev,changes};
}
function findInd(q){for(const en of KMAP){if(en.keys.some(k=>q.includes(k)))return en.ind;}return null;}
function detectSt(q,a){
  const yes=/^sim/.test(a),no=/^n[aã]o/.test(a),never=/nunca|jamais|sem retorno|sem caso de churn/.test(a);
  if(q.includes('inadimpl'))return(no||never)?'ok':(yes?'risk':'na');
  if(q.includes('cancelamento')||q.includes('nps')){if(never||/nunca teve/.test(a))return'ok';if(yes||/pediu|solicitou/.test(a))return'risk';}
  if(q.includes('fuso')){if(yes||/correto/.test(a))return'ok';if(no||/incorreto/.test(a))return'risk';}
  if(q.includes('caso')||q.includes('n2')){if(no||/não tem|sem casos/.test(a))return'ok';if(/n2|website/.test(a))return'risk';if(yes||/aberto/.test(a))return'warn';}
  if(q.includes('ocup')){const p=a.match(/(\d+)%/);if(p){const n=parseInt(p[1]);return n<30?'risk':(n<60?'warn':'ok');}if(/boa|alta|ótima/.test(a))return'ok';if(/baixa|ruim/.test(a))return'risk';}
  if(q.includes('foto')||q.includes('descriç'))return yes?'ok':(no?'warn':'na');
  if(q.includes('personaliz')||q.includes('site')){if(/bem personalizado|ativo|possui/.test(a)||yes)return'ok';return no?'warn':'na';}
  if(q.includes('domín')||q.includes('migra'))return yes?'ok':(no?'warn':'na');
  if(q.includes('financeiro')||q.includes('operacional')){if(/não tem acesso|não utiliza|não usa/.test(a))return'na';return yes?'ok':'na';}
  if(q.includes('unidade')){if(/diminuiu|reduziu|perdeu/.test(a))return'risk';if(/aumentou|cresceu/.test(a))return'ok';return'ok';}
  if(q.includes('preço')||q.includes('competit')){if(/abaixo/.test(a))return'warn';if(/muito acima|bem acima/.test(a))return'risk';if(/competitiv|adequado|médio/.test(a))return'ok';}
  if(q.includes('canal')||q.includes('listing')){if(/não conectado|desconect|queda/.test(a))return'warn';if(/todos|conectado/.test(a))return'ok';}
  if(q.includes('pagamento')){if(/stripe|paypal|mercado pago|getnet|conta bancária/.test(a))return'ok';if(no||/não tem|sem canal/.test(a))return'risk';}
  if(q.includes('atividade')||q.includes('acesso')){if(/todo dia|diariamente|esta semana/.test(a))return'ok';if(/30 dias|um mês/.test(a))return'risk';if(/7 dias|uma semana/.test(a))return'warn';}
  return'na';
}
function importTextFn(text,ci,fi){
  const f=S.clients[ci].follows[fi];let imported=0;const unmatched=[];
  text.split('\n').filter(l=>l.trim()).forEach(line=>{
    const cl=line.trim().replace(/^[-•*]\s+/,'');const nm=cl.match(/^\d+\.\s+(.+)$/),content=nm?nm[1]:cl;
    const di=content.indexOf(' - ');if(di===-1)return;
    const question=content.slice(0,di).trim(),answer=content.slice(di+3).replace(/;$/,'').trim();
    if(!question||!answer)return;const q=question.toLowerCase(),a=answer.toLowerCase();
    const key=findInd(q);if(!key){unmatched.push(question);return;}
    if(!f.indicators[key])f.indicators[key]={status:'na',notes:''};
    f.indicators[key].status=detectSt(q,a);f.indicators[key].notes=answer;imported++;
  });
  return{imported,unmatched};
}

function dashView(){

  const filt=all.filter(c=>{
    if(S.filterCountry&&c.country!==S.filterCountry)return false;
    if(S.filterRisk&&hl(calcScore(c))!==S.filterRisk)return false;
    if(S.filterPlan&&(c.plan||'')!==S.filterPlan)return false;

  const otherInds=allInds.filter(ind=>(f.indicators[ind.key]?.status||'na')!=='risk');
  let html='';
  if(riskInds.length>0){html+='<div class="risk-section-hdr">🚨 Riscos identificados — ação necessária</div><div class="ind-grid-6">'+riskInds.map(ind=>indCard(c,fi,ind,ci)).join('')+'</div>';}
  html+='<div class="section-hdr" style="margin-top:1.25rem"><span>Indicadores em ordem do follow-up</span></div><div class="ind-grid-6">'+otherInds.map(ind=>indCard(c,fi,ind,ci)).join('')+'</div>';
  return html;
}

function indCard(c,fi,ind,ci){
  const f=c.follows[fi],v=f.indicators[ind.key]||{status:'na',notes:''};
  const catCls=CAT_CSS[ind.cat]||'',stCls=v.status==='warn'?'is-warn':(v.status==='risk'?'is-risk':(v.status==='ok'?'is-ok':''));
  if(ind.special==='country'){
    const opts=Object.keys(CS).sort().map(co=>'<option value="'+e(co)+'"'+(v.value===co?' selected':'')+'>'+e(co)+'</option>').join('');
    return'<div class="ind-card '+catCls+' '+stCls+'"><div class="ind-lbl">'+ind.label+'</div><select style="margin-bottom:8px" onchange="setCountry('+ci+','+fi+',this.value)"><option value="">Selecionar país...</option>'+opts+'</select><textarea class="nf" placeholder="Observações..." oninput="noteInd('+ci+','+fi+',\''+ind.key+'\',this.value)">'+e(v.notes)+'</textarea></div>';
  }
  if(ind.special==='states'){
    const cv=f.indicators?.ind_country?.value||'',states=CS[cv]||[];
    const stOpts=states.map(st=>'<option value="'+e(st)+'">'+e(st)+'</option>').join('');
    const addSel=states.length>0?'<select style="margin-bottom:4px" onchange="addState('+ci+','+fi+',this);this.value=\'\'"><option value="">+ Adicionar estado...</option>'+stOpts+'</select>':'<p class="muted" style="font-size:11px;margin-bottom:4px">Selecione o país primeiro.</p>';
    return'<div class="ind-card '+catCls+' '+stCls+'"><div class="ind-lbl">'+ind.label+'</div>'+addSel+'<textarea class="nf" placeholder="Estados selecionados..." oninput="noteIndVal('+ci+','+fi+',\''+ind.key+'\',this.value)">'+e(v.notes||v.value||'')+'</textarea></div>';
  }
  if(ind.special==='cities'){
    const cv=v.value||v.notes||'',cnt=cv.split(',').filter(s=>s.trim()).length;
    return'<div class="ind-card '+catCls+' '+stCls+'"><div class="ind-lbl">'+ind.label+' <span class="muted">('+cnt+'/10)</span></div><textarea class="nf" placeholder="Ex: Punta Cana, Santo Domingo, ..." style="min-height:60px" oninput="setCities('+ci+','+fi+',this)">'+e(cv)+'</textarea><div class="muted" style="font-size:10px;margin-top:2px">Separe por vírgula. Máx. 10 cidades.</div></div>';
  }
  if(ind.special==='season_high'||ind.special==='season_low'){
    const isH=ind.special==='season_high',col=isH?'var(--gn700)':'var(--rd700)';
    const mOpts=(sel)=>MONTHS.map((m,idx)=>{const val=String(idx+1).padStart(2,'0');return'<option value="'+val+'"'+(v[sel]===val||v[sel]===String(idx+1)?' selected':'')+'>'+m+'</option>';}).join('');
    const lbl=(v.start&&v.end)?((isH?'🌞 ':'🌚 ')+monthName(v.start)+' a '+monthName(v.end)):'';
    return'<div class="ind-card '+catCls+'"><div class="ind-lbl" style="color:'+col+'">'+ind.label+'</div>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap">'
      +'<select class="narrow" onchange="setSeasonMonth('+ci+','+fi+',\''+ind.key+'\',\'start\',this.value)"><option value="">Início</option>'+mOpts('start')+'</select>'
      +'<span class="muted" style="font-size:11px">a</span>'
      +'<select class="narrow" onchange="setSeasonMonth('+ci+','+fi+',\''+ind.key+'\',\'end\',this.value)"><option value="">Fim</option>'+mOpts('end')+'</select>'
      +(lbl?'<span style="font-size:11px;font-weight:700;color:'+col+'">'+lbl+'</span>':'')
      +'</div>'
      +'<textarea class="nf" placeholder="Observações..." oninput="noteInd('+ci+','+fi+',\''+ind.key+'\',this.value)">'+e(v.notes)+'</textarea></div>';
  }
  if(ind.special==='activity'){
    const btns=[['ok','Esta semana'],['warn','Há 7+ dias'],['risk','Há 30+ dias'],['na','N/A']].map(([s,l])=>'<button class="ib ib-'+(s==='na'?'na':s)+(v.status===s?' active':'')+'" onclick="setInd('+ci+','+fi+',\''+ind.key+'\',\''+s+'\')">'+l+'</button>').join('');
    return'<div class="ind-card '+catCls+' '+stCls+'"><div class="ind-lbl">'+ind.label+'</div><div class="ind-btns">'+btns+'</div><textarea class="nf" placeholder="Notas..." oninput="noteInd('+ci+','+fi+',\''+ind.key+'\',this.value)">'+e(v.notes)+'</textarea></div>';
  }
  const btns=[['ok','OK'],['warn','Atenção'],['risk','Risco'],['na','N/A']].map(([s,l])=>'<button class="ib ib-'+(s==='na'?'na':s)+(v.status===s?' active':'')+'" onclick="setInd('+ci+','+fi+',\''+ind.key+'\',\''+s+'\')">'+l+'</button>').join('');
  return'<div class="ind-card '+catCls+' '+stCls+'"><div class="ind-lbl">'+ind.label+'</div><div class="ind-btns">'+btns+'</div><textarea class="nf" placeholder="Notas..." oninput="noteInd('+ci+','+fi+',\''+ind.key+'\',this.value)">'+e(v.notes)+'</textarea></div>';
}

// HANDLERS
function goBack(){S.view='dashboard';S.sel=null;S.selFollow=null;S.genText='';S.importMsg='';render();}
function goBackToClient(){S.view='client';S.selFollow=null;S.genText='';S.importMsg='';render();}
function openClient(i){S.sel=i;S.view='client';S.clientTab='info';S.genText='';S.importMsg='';render();}
function openFollow(fi){S.selFollow=fi;S.view='follow';S.genText='';S.importMsg='';render();}
function openM(n){S.modal=n;render();}function closeM(){S.modal=null;render();}
function saveClient(){
  const name=document.getElementById('mn').value.trim();if(!name){alert('Informe o nome.');return;}
  const country=document.getElementById('mc').value,plan=document.getElementById('mpl').value,units=document.getElementById('mu').value.trim(),importTxt=document.getElementById('mi').value.trim();
  const nc={id:uid(),name,country,plan,units,keyContacts:[],contacts:[],follows:[]};S.clients.push(nc);const ci=S.clients.length-1;
  if(importTxt){const nf={id:uid(),date:new Date().toISOString().split('T')[0],type:'first',indicators:mkInd(),doingWell:false};nf.indicators.ind_country={status:'na',notes:'',value:country};S.clients[ci].follows.push(nf);const{imported}=importTextFn(importTxt,ci,0);if(imported>0)S.importMsg='✅ '+imported+' indicadores importados.';}
  saveState();S.modal=null;openClient(ci);
}
function saveFollow(){
  const ci=S.sel,c=S.clients[ci];
  const nf={id:uid(),date:document.getElementById('fd').value,type:document.getElementById('ft').value,indicators:mkInd(),doingWell:false};
  nf.indicators.ind_country={status:'na',notes:'',value:c.country||''};

}
function delClient(i){if(!confirm('Excluir "'+S.clients[i].name+'" e todos os dados?'))return;S.clients.splice(i,1);saveState();goBack();}
function delFollow(ci,fi){
  const c=S.clients[ci],f=c.follows[fi];
  if(!confirm('Tem certeza que deseja excluir esse Follow-Up - '+formatDate(f.date)+'?'))return;
  S.undoFollow=JSON.parse(JSON.stringify(f));S.undoFollowIdx=fi;S.undoCI=ci;S.undoMsg='Follow-Up de '+formatDate(f.date)+' excluído.';

  setTimeout(()=>{if(S.undoMsg){S.undoMsg='';S.undoFollow=null;render();}},10000);
}

function noteInd(ci,fi,key,val){if(!S.clients[ci].follows[fi].indicators[key])S.clients[ci].follows[fi].indicators[key]={status:'na',notes:''};S.clients[ci].follows[fi].indicators[key].notes=val;saveState();}
function noteIndVal(ci,fi,key,val){const ind=S.clients[ci].follows[fi].indicators;if(!ind[key])ind[key]={status:'na',notes:'',value:''};ind[key].notes=val;ind[key].value=val;saveState();}
function setCountry(ci,fi,val){const ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_country)ind.ind_country={status:'na',notes:'',value:''};ind.ind_country.value=val;if(ind.ind_states){ind.ind_states.notes='';ind.ind_states.value='';}saveState();render();}
function addState(ci,fi,sel){const val=sel.value;if(!val)return;const ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_states)ind.ind_states={status:'na',notes:'',value:''};const cur=(ind.ind_states.notes||ind.ind_states.value||'').split(',').map(s=>s.trim()).filter(Boolean);if(!cur.includes(val))cur.push(val);const nv=cur.join(', ');ind.ind_states.notes=nv;ind.ind_states.value=nv;saveState();render();}
function setCities(ci,fi,el){const parts=el.value.split(',').map(s=>s.trim()).filter(Boolean);if(parts.length>10){el.value=parts.slice(0,10).join(', ');return;}const ind=S.clients[ci].follows[fi].indicators;if(!ind.ind_cities)ind.ind_cities={status:'na',notes:'',value:''};ind.ind_cities.notes=el.value;ind.ind_cities.value=el.value;saveState();}

function buildPrompt(){

    :'PRIMEIRA ANÁLISE:\n1. Diminuiu/aumentou unidades? - [resposta]\n2. Listings e canais conectados - [resposta]\n3. Migração de domínio - [resposta]\n4. Personalização de site - [resposta]\n5. Canal de pagamento - [resposta]\n6. Costuma ficar inadimplente? - [resposta]\n7. Localização das unidades - [resposta]\n8. Boas fotos? Boa descrição? - [resposta]\n9. Fuso horário correto? - [resposta]\n10. Preço competitivo? - [resposta]\n11. Boa ocupação? - [resposta]\n12. Last minute padrão - [resposta]\n13. Atividade no sistema - [resposta]\n14. Já pediu cancelamento? NPS? - [resposta]\n15. Casos abertos? N2/Website? - [resposta]\n16. Usa Módulo Financeiro? - [resposta]\n17. Usa Módulo Operacional? - [resposta]\n18. Oportunidade de upgrade? - [resposta]';
  return'Você é analista sênior de Customer Success da Stays.\n\nGere um follow-up estruturado para o Chatter do Salesforce.\n\n'+fmt+'\n\nDepois adicione:\n⚠️ Pontos de atenção:\n- [ponto]: [ação sugerida]\n\n📋 Próximos passos:\n- [ação]\n\n'+(ctx?'Contatos recentes:\n'+ctx+'\n\n':'')+'Cliente: '+c.name+' ('+c.country+')\nPlano: '+(PLAN_L[c.plan]||'N/A')+'\nScore: '+calcScore(c)+'/100\n\nDados:\n'+rows+'\n\nSomente o texto formatado. Sem introdução.';
}

async function genApi(){
  if(!S.apiKey){openM('settings');return;}S.generating=true;S.genText='';render();
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,messages:[{role:'user',content:buildPrompt()}]})});const d=await r.json();S.genText=d.error?('Erro: '+d.error.message):(d.content?.[0]?.text||'Resposta inválida.');}catch(err){S.genText='Erro de conexão.';}
  S.generating=false;render();
}
render();
</script>
